# ====================================================================================================
#   H2 인 메모리 DB를 사용하는 개발 환경
# ====================================================================================================

server:
  port: 80

spring:
  # 데이터베이스 연결 정보 설정 : H2 인 메모리 DB
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
  sql:
    # SQL 초기화 설정
    init:
      encoding: UTF-8
      # 내장 데이터베이스 사용시 SQL 스크립트 실행
      mode: embedded
      schema-locations:
        - classpath:sql/h2/schema.sql
      data-locations:
        - classpath:sql/h2/data.sql
  h2:
    console:
      path: /h2-console
      enabled: true